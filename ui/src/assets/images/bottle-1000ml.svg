<svg xmlns="http://www.w3.org/2000/svg" width="250" height="500" viewBox="0 0 250 500">
  <defs>
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFF9E6"/>
      <stop offset="40%" style="stop-color:#E8F6FF"/>
      <stop offset="100%" style="stop-color:#FFF3CC"/>
    </linearGradient>
    <linearGradient id="lbl3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2342"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="goldCap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#F0C040"/>
    </linearGradient>
    <linearGradient id="wat3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#29B6F6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0277BD;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <!-- Premium gold cap -->
  <rect x="90" y="8" width="70" height="30" rx="10" fill="url(#goldCap)"/>
  <rect x="94" y="12" width="62" height="22" rx="8" fill="#0A2342"/>
  <rect x="97" y="15" width="56" height="14" rx="6" fill="#1B6CA8"/>
  <rect x="90" y="34" width="70" height="4" rx="2" fill="url(#goldCap)" opacity="0.8"/>
  <!-- Neck -->
  <path d="M97,38 L88,70 L162,70 L153,38 Z" fill="url(#b3)" stroke="#C9A84C" stroke-width="1.2"/>
  <!-- Body -->
  <path d="M75,70 C66,95 58,140 58,210 L58,440 L192,440 L192,210 C192,140 184,95 175,70 Z" fill="url(#b3)" stroke="#E0C06A" stroke-width="1.5"/>
  <!-- Water fill -->
  <path d="M60,298 L59,438 L191,438 L190,298 Q125,285 60,298Z" fill="url(#wat3)"/>
  <ellipse cx="125" cy="298" rx="65" ry="9" fill="#29B6F6" opacity="0.35"/>
  <!-- Shine -->
  <path d="M90,85 Q82,160 84,280" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.3" fill="none"/>
  <path d="M97,85 Q92,140 94,220" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.2" fill="none"/>
  <!-- Premium label with gold frame -->
  <rect x="68" y="166" width="114" height="148" rx="8" fill="url(#lbl3)"/>
  <rect x="70" y="168" width="110" height="144" rx="7" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <rect x="75" y="173" width="100" height="134" rx="5" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
  <!-- Gold corner ornaments -->
  <rect x="70" y="168" width="25" height="2.5" fill="#C9A84C"/>
  <rect x="155" y="168" width="25" height="2.5" fill="#C9A84C"/>
  <rect x="70" y="310" width="25" height="2.5" fill="#C9A84C"/>
  <rect x="155" y="310" width="25" height="2.5" fill="#C9A84C"/>
  <!-- Circular emblem -->
  <circle cx="125" cy="190" r="16" fill="none" stroke="#C9A84C" stroke-width="1"/>
  <text x="125" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#C9A84C" letter-spacing="1">SP</text>
  <!-- Brand text -->
  <text x="125" y="222" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="700" fill="white" letter-spacing="3">SIERRA</text>
  <text x="125" y="242" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#4FC3F7" letter-spacing="6">PURE</text>
  <rect x="82" y="250" width="86" height="1.5" fill="#C9A84C" opacity="0.8"/>
  <text x="125" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" letter-spacing="1">1000 ml</text>
  <text x="125" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">Premium Mineral Water</text>
  <text x="125" y="303" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="rgba(201,168,76,0.85)" letter-spacing="1">NABL CERTIFIED</text>
  <!-- Bottom -->
  <path d="M58,440 Q58,468 125,468 Q192,468 192,440 Z" fill="#E0C06A" opacity="0.25"/>
</svg>
