<svg xmlns="http://www.w3.org/2000/svg" width="220" height="460" viewBox="0 0 220 460">
  <defs>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8E6F5"/>
      <stop offset="40%" style="stop-color:#E8F6FF"/>
      <stop offset="100%" style="stop-color:#90CAF9"/>
    </linearGradient>
    <linearGradient id="lbl2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2342"/>
      <stop offset="100%" style="stop-color:#0D3060"/>
    </linearGradient>
    <linearGradient id="wat2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#29B6F6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0277BD;stop-opacity:0.85"/>
    </linearGradient>
  </defs>
  <!-- Cap -->
  <rect x="83" y="8" width="54" height="25" rx="9" fill="#060F1E"/>
  <rect x="87" y="12" width="46" height="17" rx="7" fill="#0A2342"/>
  <rect x="90" y="14" width="40" height="11" rx="5" fill="#1B6CA8"/>
  <!-- Neck -->
  <path d="M88,33 L82,62 L138,62 L132,33 Z" fill="url(#b2)" stroke="#90CAF9" stroke-width="1.2"/>
  <ellipse cx="110" cy="62" rx="28" ry="5" fill="#B3E5FC" opacity="0.6"/>
  <!-- Body -->
  <path d="M72,62 C65,80 58,120 58,180 L58,400 L162,400 L162,180 C162,120 155,80 148,62 Z" fill="url(#b2)" stroke="#90CAF9" stroke-width="1.5"/>
  <!-- Water fill -->
  <path d="M60,258 L59,398 L161,398 L160,258 Q110,246 60,258Z" fill="url(#wat2)"/>
  <ellipse cx="110" cy="258" rx="50" ry="7" fill="#29B6F6" opacity="0.4"/>
  <!-- Shine -->
  <path d="M80,75 Q74,140 76,240" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.35" fill="none"/>
  <path d="M86,75 Q82,120 84,180" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25" fill="none"/>
  <!-- Label -->
  <rect x="68" y="153" width="84" height="115" rx="7" fill="url(#lbl2)"/>
  <rect x="70" y="155" width="80" height="111" rx="6" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
  <!-- Gold corners -->
  <rect x="70" y="155" width="20" height="2" fill="#C9A84C"/>
  <rect x="130" y="155" width="20" height="2" fill="#C9A84C"/>
  <rect x="70" y="264" width="20" height="2" fill="#C9A84C"/>
  <rect x="130" y="264" width="20" height="2" fill="#C9A84C"/>
  <!-- Label text -->
  <text x="110" y="192" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="white" letter-spacing="3">SIERRA</text>
  <text x="110" y="212" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#4FC3F7" letter-spacing="6">PURE</text>
  <rect x="76" y="220" width="68" height="1.5" fill="#C9A84C" opacity="0.7"/>
  <text x="110" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.85)" letter-spacing="1">500 ml</text>
  <text x="110" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.55)">Natural Mineral Water</text>
  <!-- BIS badge -->
  <circle cx="110" cy="150" r="7" fill="#C9A84C" opacity="0.9"/>
  <text x="110" y="154" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="white">BIS</text>
  <!-- Bottom -->
  <path d="M58,400 Q58,425 110,425 Q162,425 162,400 Z" fill="#B3E5FC"/>
</svg>
