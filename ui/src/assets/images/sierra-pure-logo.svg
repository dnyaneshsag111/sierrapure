<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="600" height="400" fill="#000000"/>
  
  <!-- Mountain Range - Red peaks -->
  <g transform="translate(0, 50)">
    <!-- Left side mountains -->
    <path d="M 0,120 L 80,70 L 130,85 L 180,120 Z" fill="#DC2626"/>
    
    <!-- Main mountain range -->
    <path d="M 50,120 L 150,40 L 200,70 L 250,20 L 300,10 L 350,30 L 400,60 L 450,45 L 500,80 L 550,120 Z" fill="#DC2626"/>
    
    <!-- Right side mountains -->
    <path d="M 420,120 L 470,60 L 520,75 L 570,50 L 600,120 Z" fill="#DC2626"/>
    
    <!-- Darker mountain layer for depth -->
    <path d="M 100,120 L 180,55 L 220,75 L 280,35 L 320,50 L 380,90 L 450,120 Z" fill="#B91C1C" opacity="0.8"/>
  </g>
  
  <!-- SIERRA text -->
  <text x="300" y="240" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="#DC2626" text-anchor="middle" letter-spacing="12">
    SIERRA
  </text>
  
  <!-- Left line -->
  <line x1="140" y1="305" x2="220" y2="305" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Pure text -->
  <text x="300" y="312" font-family="Georgia, serif" font-size="36" font-weight="300" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">
    Pure
  </text>
  
  <!-- Right line -->
  <line x1="380" y1="305" x2="460" y2="305" stroke="#FFFFFF" stroke-width="2"/>
</svg>