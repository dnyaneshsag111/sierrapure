<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2342"/>
      <stop offset="50%" style="stop-color:#1B6CA8"/>
      <stop offset="100%" style="stop-color:#4FC3F7"/>
    </linearGradient>
    <linearGradient id="ld1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#1B6CA8"/>
    </linearGradient>
    <linearGradient id="gld" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F0C040"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- Icon background -->
  <circle cx="78" cy="80" r="68" fill="url(#lg1)" opacity="0.07"/>
  <circle cx="78" cy="80" r="62" fill="none" stroke="url(#lg1)" stroke-width="1.5" opacity="0.25"/>
  <!-- Mountain peaks -->
  <polygon points="78,22 40,90 116,90" fill="url(#lg1)" opacity="0.88"/>
  <polygon points="78,34 54,90 102,90" fill="url(#ld1)" opacity="0.45"/>
  <polygon points="106,44 84,90 128,90" fill="url(#lg1)" opacity="0.55"/>
  <!-- Water waves -->
  <path d="M28,96 Q50,85 72,96 Q94,107 116,96 Q130,87 138,93 L138,110 L28,110 Z" fill="url(#ld1)" opacity="0.65"/>
  <path d="M28,104 Q52,91 76,104 Q100,117 124,104 Q132,98 138,102 L138,122 Q118,128 98,122 Q72,116 48,122 Q34,126 28,122 Z" fill="url(#ld1)" opacity="0.35"/>
  <!-- Gold accent bar -->
  <rect x="28" y="125" width="110" height="2.5" rx="1.2" fill="url(#gld)" opacity="0.85"/>
  <!-- SIERRA text -->
  <text x="162" y="74" font-family="Georgia, Times New Roman, serif" font-size="54" font-weight="700" fill="url(#lg1)" letter-spacing="5">SIERRA</text>
  <!-- PURE text -->
  <text x="168" y="112" font-family="Georgia, Times New Roman, serif" font-size="34" font-weight="300" fill="#4FC3F7" letter-spacing="20">PURE</text>
  <!-- Gold underline -->
  <rect x="162" y="120" width="340" height="2.5" rx="1.2" fill="url(#gld)" opacity="0.75"/>
  <!-- Tagline -->
  <text x="165" y="142" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7A99" letter-spacing="5" font-weight="400">PREMIUM MINERAL WATER</text>
</svg>
