version: "3.9"
services:
  mongodb:
    image: mongo:7.0
    container_name: sierrapure-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: sierrapure
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - sierrapure-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: sierrapure-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/sierrapure?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: sierrapure
      JWT_SECRET: ${JWT_SECRET:-SierraPure-Super-Secret-Key-2026-MinLength64-ForHMAC-SHA512-Security}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-28800000}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-noreply@sierrapure.in}
      MAIL_ADMIN: ${MAIL_ADMIN:-admin@sierrapure.in}
      MAIL_TEST_MODE: ${MAIL_TEST_MODE:-false}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      RATE_LIMIT_LOGIN_CAPACITY: ${RATE_LIMIT_LOGIN_CAPACITY:-10}
      RATE_LIMIT_CONTACT_CAPACITY: ${RATE_LIMIT_CONTACT_CAPACITY:-3}
      RATE_LIMIT_OTP_CAPACITY: ${RATE_LIMIT_OTP_CAPACITY:-3}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - sierrapure-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v3/api-docs > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  mongo-express:
    image: mongo-express:1.0.2
    container_name: sierrapure-mongo-ui
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - sierrapure-net
    profiles:
      - dev
volumes:
  mongo_data:
  mongo_config:
  uploads_data:
networks:
  sierrapure-net:
    driver: bridge
