# ===========================
# Sierra Pure - Application Config
# ===========================

# Server
server.port=8080
spring.application.name=sierrapure

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/sierrapure
spring.data.mongodb.database=sierrapure

# Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# Multipart File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Local Image Storage (inside project directory)
app.upload.dir=${user.dir}/uploads
app.upload.bottles-dir=${user.dir}/uploads/bottles
app.upload.clients-dir=${user.dir}/uploads/clients
app.upload.logo-dir=${user.dir}/uploads/logo

# Cloudinary Config (future cloud provider - currently unused)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:sierrapure}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# Frontend URL (for CORS and email links)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# App Base URL (used for QR code links and email links)
app.base.url=${APP_BASE_URL:http://localhost:5173}

# ?? JWT ??????????????????????????????????????????????????????????????????
# IMPORTANT: Change this secret in production (min 64 chars for HS512)
app.jwt.secret=${JWT_SECRET:SierraPure-Super-Secret-Key-2026-MinLength64-ForHMAC-SHA512-Security}
# Token valid for 8 hours (ms)
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# ?? Email (SMTP) ??????????????????????????????????????????????????????????
# For development: use Gmail SMTP or Mailtrap (set TEST_MODE=true to skip sending)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email from / admin addresses
app.mail.from=${MAIL_FROM:noreply@sierrapure.in}
app.mail.admin=${MAIL_ADMIN:admin@sierrapure.in}

# Thymeleaf (used for PDF generation)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.com.mineralwater.sierrapure=DEBUG
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.security=WARN
